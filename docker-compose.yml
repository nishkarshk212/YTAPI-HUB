services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ytapi
      POSTGRES_PASSWORD: ytapi_secret
      POSTGRES_DB: ytapi_hub
    ports:
      - "5432:5432"
    volumes:
      - ytapi_postgres_data:/var/lib/postgresql/data

volumes:
  ytapi_postgres_data:
